apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-hello
  namespace: cloud-challenge
  labels:
    app: service-hello
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-hello
  template:
    metadata:
      labels:
        app: service-hello
    spec:
      containers:
        - name: service-hello
          # Replace <ACCOUNT_ID> and <REGION> before applying
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/cloud-challenge/service-hello:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: service-hello
  namespace: cloud-challenge
spec:
  selector:
    app: service-hello
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
